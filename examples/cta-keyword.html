<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Brand System Template — CTA Keyword Example</title>
  <link rel="stylesheet" href="../tokens/fonts.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2a2a2a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: 'Inter', sans-serif;
    }

    .slide {
      aspect-ratio: 4/5;
      width: min(540px, 90vw);
      background-color: var(--color-azul-primario);
      background-image:
        radial-gradient(ellipse at top, rgba(255,255,255,0.12), transparent 60%);
      position: relative;
      overflow: hidden;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      border-radius: 4px;
    }

    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 6px);
      pointer-events: none;
    }

    .top {
      padding-top: 2rem;
      position: relative;
      z-index: 2;
    }

    .comenta {
      font-family: var(--font-sans-condensed);
      font-size: 3.8rem;
      line-height: 1;
      color: var(--color-blanco-roto);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }

    .keyword {
      font-family: var(--font-sans-condensed);
      font-size: 9rem;
      line-height: 0.9;
      color: var(--color-amarillo-acento);
      text-transform: uppercase;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 2;
      text-shadow: 0 3px 0 rgba(26,26,26,0.1);
    }

    .promise {
      font-family: var(--font-sans-condensed);
      font-weight: 400;
      font-size: 1.6rem;
      line-height: 1.3;
      color: var(--color-blanco-roto);
      max-width: 80%;
      margin-top: 1.5rem;
      position: relative;
      z-index: 2;
    }

    .footer-handle {
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--color-blanco-roto);
      padding-bottom: 1.5rem;
      position: relative;
      z-index: 2;
    }

    .caption {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: #ccc;
      font-size: 0.85rem;
      font-family: monospace;
      max-width: 400px;
      background: rgba(0,0,0,0.5);
      padding: 0.8rem 1rem;
      border-radius: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="caption">
    <strong>examples/cta-keyword.html</strong><br>
    Aplica pattern 07-cta-keyword del brand system.<br>
    Fuentes: Google Fonts (free).
  </div>

  <article class="slide">
    <div class="top">
      <h2 class="comenta">COMENTA</h2>
      <h1 class="keyword">"KEYWORD"</h1>
      <p class="promise">
        y te mando [la promesa concreta del post] por privado
      </p>
    </div>

    <p class="footer-handle">@tu-handle</p>
  </article>
</body>
</html>
